name: Build GKI Kernel · Android 14 / 6.1 + KernelSU-Next + SUSFS

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: "Kernel manifest branch"
        type: string
        default: "common-android14-6.1-2026-03"
        required: true

      ksu_tag:
        description: "KernelSU-Next tag/commit to pin (blank = latest next HEAD)"
        type: string
        default: ""
        required: false

      susfs_branch:
        description: "SUSFS branch"
        type: string
        default: "gki-android14-6.1"
        required: true

      lto:
        description: "LTO mode"
        type: choice
        options:
          - thin
          - full
          - none
        default: thin

      anykernel3:
        description: "Package with AnyKernel3?"
        type: boolean
        default: true

      boot_image_url:
        description: "Stock boot.img URL for patching (optional)"
        type: string
        default: ""
        required: false

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────

  build:
    name: Build · android14-6.1
    runs-on: ubuntu-latest

    env:
      KERNEL_ROOT: ${{ github.workspace }}/kernel
      DIST_DIR:    ${{ github.workspace }}/kernel/out/dist
      SUSFS_DIR:   ${{ github.workspace }}/susfs4ksu
      KSU_SETUP_URL: "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh"

    steps:
      # ── 0. Maximise disk space ──────────────────────────────────────────────
      - name: Free disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android:          true
          remove_dotnet:           true
          remove_haskell:          true
          remove_tool_cache:       true
          remove_swap:             true
          remove_packages: >
            azure-cli google-cloud-cli microsoft-edge-stable
            google-chrome-stable firefox postgresql* temurin-*
            *llvm* mysql* dotnet-sdk-*
          remove_packages_one_command: true
          remove_folders: >
            /usr/share/swift /usr/share/miniconda /usr/share/az*
            /usr/local/lib/node_modules /usr/local/share/chromium
            /usr/local/share/powershell /usr/local/julia
            /usr/local/aws-cli /usr/local/aws-sam-cli
            /usr/share/gradle
          rm_cmd:      rmz
          rmz_version: "3.1.1"
          testing:     false

      # ── 1. Install host dependencies ────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git libelf-dev libncurses-dev libssl-dev lz4 \
            python3 python3-pip unzip wget zip zstd \
            ccache

      # ── 2. Configure ccache ─────────────────────────────────────────────────
      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: "4G"
          key: gki-a14-6.1-${{ inputs.manifest_branch }}

      # ── 3. Checkout this repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 4. repo init + sync ─────────────────────────────────────────────────
      - name: repo init
        run: |
          mkdir -p "$KERNEL_ROOT"
          cd "$KERNEL_ROOT"
          repo init \
            --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b "${{ inputs.manifest_branch }}" \
            --repo-rev=v2.16

      - name: repo sync
        run: |
          cd "$KERNEL_ROOT"
          repo sync \
            -c \
            --no-tags \
            --no-clone-bundle \
            -j$(nproc --all) \
            --fail-fast
          echo "Disk usage after sync:"; df -h .

      # ── 5. Clone SUSFS early (needed before KSU setup) ─────────────────────
      - name: Clone SUSFS
        run: |
          git clone \
            --depth=1 \
            -b "${{ inputs.susfs_branch }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git \
            "$SUSFS_DIR"
          SUSFS_COMMIT=$(cd "$SUSFS_DIR" && git rev-parse --short HEAD)
          echo "SUSFS_COMMIT=$SUSFS_COMMIT" >> "$GITHUB_ENV"
          echo "SUSFS commit: $SUSFS_COMMIT"

      # ── 6. Set up KernelSU-Next ─────────────────────────────────────────────
      - name: Set up KernelSU-Next
        run: |
          cd "$KERNEL_ROOT/common"

          KSU_TAG="${{ inputs.ksu_tag }}"

          HTTP_STATUS=$(curl -o /dev/null -sLw "%{http_code}" "$KSU_SETUP_URL")
          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "ERROR: setup.sh URL returned HTTP $HTTP_STATUS — URL: $KSU_SETUP_URL"
            exit 1
          fi

          REF="${KSU_TAG:-next}"
          echo ">>> Installing KernelSU-Next at ref: $REF"
          curl -LSs "$KSU_SETUP_URL" | bash -s "$REF"

          KSU_COMMIT=$(cd KernelSU-Next && git rev-parse --short HEAD)
          echo "KSU_COMMIT=$KSU_COMMIT" >> "$GITHUB_ENV"
          echo "KernelSU-Next commit: $KSU_COMMIT"

      # ── 7. Apply SUSFS — patches + source files ─────────────────────────────
      #
      #  This step has two distinct parts that must both happen:
      #
      #  PART A — Patch existing kernel files
      #    50_add_susfs_in_<branch>.patch modifies existing files
      #    (fs/namespace.c, fs/exec.c, etc.) to add SUSFS hook calls and
      #    #include <linux/susfs.h>. The patch does NOT create new files.
      #
      #  PART B — Copy new SUSFS source files  ← THE FIX FOR ERROR SET 1
      #    susfs.c and susfs.h are brand-new files that live in the SUSFS repo.
      #    They must be manually copied into the kernel tree. Without this,
      #    every symbol from susfs.h (DEFAULT_KSU_MNT_ID, susfs_mnt_id_ida,
      #    susfs_is_current_ksu_domain, etc.) is undeclared.
      #
      #  PART C — Enable SUSFS inside KernelSU-Next
      #    10_enable_susfs_for_ksu.patch modifies KernelSU-Next's init.c,
      #    allowlist.c, etc. to call into SUSFS.
      #
      #    ⚠ API COMPATIBILITY (ERROR SET 2):
      #    The SUSFS patch calls ksu_syscall_hook_manager_{init,exit} but
      #    the KernelSU-Next 'next' branch uses ksu_syscall_hook_{init,exit}.
      #    After patching, we rename the calls to match what actually exists.
      #
      - name: Apply SUSFS patches and copy source files
        run: |
          BRANCH="${{ inputs.susfs_branch }}"
          PATCHES="$SUSFS_DIR/kernel_patches"
          KERNEL="$KERNEL_ROOT/common"

          cd "$KERNEL"

          # ── PART A: Kernel-side patch ──────────────────────────────────────
          KPATCH=$(ls "$PATCHES"/50_add_susfs_in_${BRANCH}*.patch 2>/dev/null | head -1)
          if [[ -z "$KPATCH" ]]; then
            echo "ERROR: no 50_add_susfs_in_${BRANCH}*.patch found in $PATCHES/"
            ls "$PATCHES"/
            exit 1
          fi
          echo ">>> Applying kernel SUSFS patch: $(basename "$KPATCH")"
          patch -p1 --forward --no-backup-if-mismatch < "$KPATCH" || {
            echo "WARNING: kernel SUSFS patch had rejects — listing .rej files:"
            find . -name "*.rej" | head -20
            # Don't exit — partial apply is often fine for the core files
          }

          # ── PART B: Copy new SUSFS source files ────────────────────────────
          # These are NEW files the patch doesn't create — they must be copied.
          echo ">>> Copying SUSFS source files into kernel tree"

          SUSFS_C="$PATCHES/fs/susfs.c"
          SUSFS_H="$PATCHES/include/linux/susfs.h"

          if [[ ! -f "$SUSFS_C" ]]; then
            echo "ERROR: $SUSFS_C not found in SUSFS repo — check susfs_branch"
            ls "$PATCHES/fs/" 2>/dev/null || echo "(no fs/ dir)"
            exit 1
          fi
          if [[ ! -f "$SUSFS_H" ]]; then
            echo "ERROR: $SUSFS_H not found in SUSFS repo"
            ls "$PATCHES/include/linux/" 2>/dev/null || echo "(no include/linux/ dir)"
            exit 1
          fi

          cp -v "$SUSFS_C" fs/susfs.c
          cp -v "$SUSFS_H" include/linux/susfs.h

          # The 50_ patch should have already added "obj-y += susfs.o" to
          # fs/Makefile. Verify; add it if not present (safety net).
          if ! grep -q 'susfs\.o' fs/Makefile; then
            echo ">>> fs/Makefile missing susfs.o entry — adding it"
            echo 'obj-y += susfs.o' >> fs/Makefile
          fi

          # ── PART C: KernelSU-Next SUSFS enablement patch ───────────────────
          KSU_PATCH="$PATCHES/KernelSU/10_enable_susfs_for_ksu.patch"
          if [[ -f "$KSU_PATCH" ]]; then
            echo ">>> Applying KernelSU-Next SUSFS enablement patch"
            cd KernelSU-Next
            patch -p1 --forward --no-backup-if-mismatch < "$KSU_PATCH" || {
              echo "WARNING: KSU enablement patch had rejects (possibly partial apply)"
              find . -name "*.rej" | head -10
            }

            # ── API COMPATIBILITY SHIM ────────────────────────────────────────
            # The SUSFS patch calls ksu_syscall_hook_manager_{init,exit} but
            # KernelSU-Next 'next' renamed them to ksu_syscall_hook_{init,exit}.
            # Fix any occurrence of the old names left in patched files.
            echo ">>> Checking for ksu_syscall_hook_manager_* API rename"
            if grep -r 'ksu_syscall_hook_manager_init' . --include='*.c' --include='*.h' -l 2>/dev/null | grep -q .; then
              echo "    Found old API names — applying rename shim"
              find . \( -name '*.c' -o -name '*.h' \) \
                -exec sed -i \
                  -e 's/ksu_syscall_hook_manager_init/ksu_syscall_hook_init/g' \
                  -e 's/ksu_syscall_hook_manager_exit/ksu_syscall_hook_exit/g' \
                  {} +
            else
              echo "    No old API names found — no shim needed"
            fi

            # ksu_late_loaded: if the patch added calls to it but the
            # declaration hunk was rejected, declare it in the init.c itself.
            if grep -q 'ksu_late_loaded' core/init.c 2>/dev/null; then
              if ! grep -q 'ksu_late_loaded' ksu.h 2>/dev/null && \
                 ! grep -q 'bool ksu_late_loaded' core/init.c 2>/dev/null; then
                echo ">>> Injecting missing ksu_late_loaded declaration"
                # Prepend declaration near the top of init.c (after the last #include)
                awk '/#include/{p=NR} END{print p}' core/init.c | \
                  xargs -I{} sed -i '{}a static bool ksu_late_loaded = false;' core/init.c
              fi
            fi

            cd ..
          else
            echo "WARNING: $KSU_PATCH not found — skipping KSU enablement patch"
          fi

          # ── PART D: Scope-minimised manual hooks (optional) ────────────────
          HOOKS="$PATCHES/60_scope-minimized_manual_hooks.patch"
          if [[ -f "$HOOKS" ]]; then
            echo ">>> Applying scope-minimised manual hooks patch"
            patch -p1 --forward --no-backup-if-mismatch < "$HOOKS" || \
              echo "WARNING: hooks patch had rejects"
          fi

      # ── 8. Verify key symbols are resolvable before wasting build time ──────
      - name: Pre-build sanity check
        run: |
          KERNEL="$KERNEL_ROOT/common"
          echo "=== Checking SUSFS header is in place ==="
          if [[ ! -f "$KERNEL/include/linux/susfs.h" ]]; then
            echo "FAIL: include/linux/susfs.h missing"; exit 1
          fi
          echo "PASS: include/linux/susfs.h exists"

          echo "=== Checking susfs.c is in place ==="
          if [[ ! -f "$KERNEL/fs/susfs.c" ]]; then
            echo "FAIL: fs/susfs.c missing"; exit 1
          fi
          echo "PASS: fs/susfs.c exists"

          echo "=== Checking fs/Makefile references susfs.o ==="
          if ! grep -q 'susfs\.o' "$KERNEL/fs/Makefile"; then
            echo "FAIL: fs/Makefile has no susfs.o entry"; exit 1
          fi
          echo "PASS: fs/Makefile references susfs.o"

          echo "=== Checking no stale ksu_syscall_hook_manager_* remains ==="
          if grep -r 'ksu_syscall_hook_manager_' "$KERNEL/drivers/kernelsu/" \
               --include='*.c' --include='*.h' -l 2>/dev/null | grep -q .; then
            echo "FAIL: old ksu_syscall_hook_manager_* API still present after shim"
            grep -r 'ksu_syscall_hook_manager_' "$KERNEL/drivers/kernelsu/" \
              --include='*.c' --include='*.h' -n
            exit 1
          fi
          echo "PASS: no stale ksu_syscall_hook_manager_* calls"

          echo "=== KernelSU-Next version info ==="
          cd "$KERNEL/KernelSU-Next"
          git log --oneline -3

      # ── 9. Build with Bazel (Kleaf) ─────────────────────────────────────────
      - name: Build kernel (Bazel / Kleaf)
        run: |
          cd "$KERNEL_ROOT"
          mkdir -p "$DIST_DIR"
          echo ">>> Starting Kleaf build (LTO=${{ inputs.lto }})"
          tools/bazel run \
            --jobs=$(nproc --all) \
            --lto="${{ inputs.lto }}" \
            //common:kernel_aarch64_dist \
            -- --destdir="$DIST_DIR"
          echo ">>> Build artifacts:"; ls -lh "$DIST_DIR"

      # ── 10. Build summary ───────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          {
            echo "## 🏗️ Build Summary"
            echo ""
            echo "| Component | Value |"
            echo "|---|---|"
            echo "| Manifest branch | \`${{ inputs.manifest_branch }}\` |"
            echo "| KernelSU-Next commit | \`${{ env.KSU_COMMIT }}\` |"
            echo "| SUSFS branch | \`${{ inputs.susfs_branch }}\` |"
            echo "| SUSFS commit | \`${{ env.SUSFS_COMMIT }}\` |"
            echo "| LTO | \`${{ inputs.lto }}\` |"
            echo ""
            if [[ -d "$DIST_DIR" ]]; then
              echo "### Output files"
              echo '```'
              ls -lh "$DIST_DIR"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── 11. (Optional) Patch stock boot.img ────────────────────────────────
      - name: Patch stock boot.img with magiskboot
        if: ${{ inputs.boot_image_url != '' }}
        run: |
          echo ">>> Downloading stock boot.img"
          curl -L --progress-bar -o stock_boot.img "${{ inputs.boot_image_url }}"

          MAGISK_URL=$(curl -s \
            https://api.github.com/repos/topjohnwu/Magisk/releases/latest \
            | grep browser_download_url | grep '\.apk' | head -1 | cut -d '"' -f4)
          curl -L --progress-bar -o magisk.apk "$MAGISK_URL"
          unzip -qo magisk.apk lib/x86_64/libmagiskboot.so -d magisk_tmp
          cp magisk_tmp/lib/x86_64/libmagiskboot.so magiskboot && chmod +x magiskboot

          mkdir boot_work && cd boot_work
          ../magiskboot unpack ../stock_boot.img
          cp "$DIST_DIR/Image" kernel
          ../magiskboot repack ../stock_boot.img ../patched_boot.img
          cd ..
          ls -lh patched_boot.img
          echo "PATCHED_BOOT_READY=true" >> "$GITHUB_ENV"

      # ── 12. (Optional) AnyKernel3 packaging ────────────────────────────────
      - name: Package with AnyKernel3
        if: ${{ inputs.anykernel3 == true || inputs.anykernel3 == 'true' }}
        run: |
          AK3_DIR="${{ github.workspace }}/AnyKernel3"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git "$AK3_DIR"
          sed -i \
            -e 's/do\.devicecheck=1/do.devicecheck=0/' \
            -e '/^supported\.versions/d' \
            -e '/^supported\.patchlevels/d' \
            "$AK3_DIR/anykernel.sh"

          cp "$DIST_DIR/Image"     "$AK3_DIR/"
          cp "$DIST_DIR/Image.lz4" "$AK3_DIR/" 2>/dev/null || true

          ZIP_NAME="AK3-A14-6.1-KSUN-SUSFS-${{ env.KSU_COMMIT }}.zip"
          cd "$AK3_DIR"
          zip -r9 -q "${{ github.workspace }}/$ZIP_NAME" . \
            -x '*.git*' -x 'README.md'
          cd "${{ github.workspace }}"
          echo "AK3_ZIP=$ZIP_NAME" >> "$GITHUB_ENV"
          ls -lh "$ZIP_NAME"

      # ── 13. Upload artifacts ────────────────────────────────────────────────
      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-a14-6.1
          path: |
            ${{ env.DIST_DIR }}/Image
            ${{ env.DIST_DIR }}/Image.lz4
          if-no-files-found: warn
          retention-days: 7

      - name: Upload AnyKernel3 ZIP
        if: ${{ inputs.anykernel3 == true || inputs.anykernel3 == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: AK3-A14-6.1-KSUN-SUSFS
          path: ${{ env.AK3_ZIP }}
          if-no-files-found: warn
          retention-days: 7

      - name: Upload patched boot.img
        if: ${{ env.PATCHED_BOOT_READY == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: patched-boot-a14-6.1
          path: patched_boot.img
          if-no-files-found: warn
          retention-days: 7

      - name: Upload full dist folder
        uses: actions/upload-artifact@v4
        with:
          name: dist-a14-6.1-full
          path: ${{ env.DIST_DIR }}/
          if-no-files-found: warn
          retention-days: 3
