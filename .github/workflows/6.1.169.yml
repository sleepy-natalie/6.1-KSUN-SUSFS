name: Build GKI Kernel · Android 14 / 6.1 + KernelSU-Next + SUSFS

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: "Kernel manifest branch"
        type: string
        default: "common-android14-6.1-2026-03"
        required: true

      ksu_tag:
        description: "KernelSU-Next tag/commit to pin (blank = latest next HEAD)"
        type: string
        default: ""
        required: false

      susfs_branch:
        description: "SUSFS branch"
        type: string
        default: "gki-android14-6.1"
        required: true

      lto:
        description: "LTO mode"
        type: choice
        options:
          - thin
          - full
          - none
        default: thin

      anykernel3:
        description: "Package with AnyKernel3?"
        type: boolean
        default: true

      boot_image_url:
        description: "Stock boot.img URL for patching (optional)"
        type: string
        default: ""
        required: false

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────

  build:
    name: Build · android14-6.1
    runs-on: ubuntu-latest

    env:
      KERNEL_ROOT: ${{ github.workspace }}/kernel
      DIST_DIR:    ${{ github.workspace }}/kernel/out/dist
      SUSFS_DIR:   ${{ github.workspace }}/susfs4ksu
      KSU_SETUP_URL: "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh"

    steps:
      # ── 0. Maximise disk space ──────────────────────────────────────────────
      - name: Free disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android:          true
          remove_dotnet:           true
          remove_haskell:          true
          remove_tool_cache:       true
          remove_swap:             true
          remove_packages: >
            azure-cli google-cloud-cli microsoft-edge-stable
            google-chrome-stable firefox postgresql* temurin-*
            *llvm* mysql* dotnet-sdk-*
          remove_packages_one_command: true
          remove_folders: >
            /usr/share/swift /usr/share/miniconda /usr/share/az*
            /usr/local/lib/node_modules /usr/local/share/chromium
            /usr/local/share/powershell /usr/local/julia
            /usr/local/aws-cli /usr/local/aws-sam-cli
            /usr/share/gradle
          rm_cmd:      rmz
          rmz_version: "3.1.1"
          testing:     false

      # ── 1. Install host dependencies (including repo) ───────────────────────
      #
      #  'repo' is NOT pre-installed on ubuntu-latest. Install it from the
      #  official source into ~/bin and add that to PATH for all later steps.
      #
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git libelf-dev libncurses-dev libssl-dev lz4 \
            python3 python3-pip unzip wget zip zstd \
            ccache

          # Install the 'repo' launcher
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo \
            -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

          # repo needs a git identity configured
          git config --global user.email "ci@github-actions"
          git config --global user.name  "GitHub Actions"

          # Silence the repo colour warning on non-interactive shells
          git config --global color.ui false

      # ── 2. Configure ccache ─────────────────────────────────────────────────
      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: "4G"
          key: gki-a14-6.1-${{ inputs.manifest_branch }}

      # ── 3. Checkout this repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 4. repo init ─────────────────────────────────────────────────────────
      - name: repo init
        run: |
          mkdir -p "$KERNEL_ROOT"
          cd "$KERNEL_ROOT"
          # Accept the repo licence non-interactively
          yes | repo init \
            --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b "${{ inputs.manifest_branch }}" \
            --repo-rev=v2.16 \
            --no-clone-bundle \
            --no-tags \
          || repo init \
            --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b "${{ inputs.manifest_branch }}" \
            --repo-rev=v2.16 \
            --no-clone-bundle \
            --no-tags

      # ── 5. repo sync ─────────────────────────────────────────────────────────
      - name: repo sync
        run: |
          cd "$KERNEL_ROOT"
          repo sync \
            -c \
            --no-tags \
            --no-clone-bundle \
            -j$(nproc --all) \
            --fail-fast
          echo "Disk usage after sync:"; df -h .

      # ── 6. Clone SUSFS ───────────────────────────────────────────────────────
      - name: Clone SUSFS
        run: |
          git clone \
            --depth=1 \
            -b "${{ inputs.susfs_branch }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git \
            "$SUSFS_DIR"
          SUSFS_COMMIT=$(cd "$SUSFS_DIR" && git rev-parse --short HEAD)
          echo "SUSFS_COMMIT=$SUSFS_COMMIT" >> "$GITHUB_ENV"
          echo "SUSFS commit: $SUSFS_COMMIT"

      # ── 7. Set up KernelSU-Next ──────────────────────────────────────────────
      - name: Set up KernelSU-Next
        run: |
          cd "$KERNEL_ROOT/common"

          HTTP_STATUS=$(curl -o /dev/null -sLw "%{http_code}" "$KSU_SETUP_URL")
          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "ERROR: setup.sh URL returned HTTP $HTTP_STATUS"
            exit 1
          fi

          REF="${{ inputs.ksu_tag }}"
          REF="${REF:-next}"
          echo ">>> Installing KernelSU-Next at ref: $REF"
          curl -LSs "$KSU_SETUP_URL" | bash -s "$REF"

          KSU_COMMIT=$(cd KernelSU-Next && git rev-parse --short HEAD)
          echo "KSU_COMMIT=$KSU_COMMIT" >> "$GITHUB_ENV"
          echo "KernelSU-Next commit: $KSU_COMMIT"

      # ── 8. Apply SUSFS patches and copy source files ─────────────────────────
      #
      #  PART A  50_add_susfs_in_<branch>.patch  — modifies existing kernel files
      #  PART B  Copy fs/susfs.c + include/linux/susfs.h  — NEW files, must be
      #          copied manually; the patch does NOT create them
      #  PART C  10_enable_susfs_for_ksu.patch  — modifies KernelSU-Next
      #          + API shim: rename ksu_syscall_hook_manager_* → ksu_syscall_hook_*
      #  PART D  60_scope-minimized_manual_hooks.patch  — optional
      #
      - name: Apply SUSFS patches and copy source files
        run: |
          BRANCH="${{ inputs.susfs_branch }}"
          PATCHES="$SUSFS_DIR/kernel_patches"
          KERNEL="$KERNEL_ROOT/common"
          cd "$KERNEL"

          # PART A — kernel-side patch
          KPATCH=$(ls "$PATCHES"/50_add_susfs_in_${BRANCH}*.patch 2>/dev/null | head -1)
          if [[ -z "$KPATCH" ]]; then
            echo "ERROR: no 50_add_susfs_in_${BRANCH}*.patch found"; ls "$PATCHES"/; exit 1
          fi
          echo ">>> Applying kernel SUSFS patch: $(basename "$KPATCH")"
          patch -p1 --forward --no-backup-if-mismatch < "$KPATCH" || {
            echo "WARNING: patch had rejects:"; find . -name "*.rej" | head -20
          }

          # PART B — copy new SUSFS source files
          echo ">>> Copying SUSFS source files"
          [[ -f "$PATCHES/fs/susfs.c" ]] || { echo "ERROR: $PATCHES/fs/susfs.c missing"; exit 1; }
          [[ -f "$PATCHES/include/linux/susfs.h" ]] || { echo "ERROR: susfs.h missing"; exit 1; }
          [[ -f "$PATCHES/include/linux/susfs_def.h" ]] || { echo "ERROR: susfs_def.h missing"; exit 1; }
          cp -v "$PATCHES/fs/susfs.c"            fs/susfs.c
          cp -v "$PATCHES/include/linux/susfs.h" include/linux/susfs.h
          cp -v "$PATCHES/include/linux/susfs_def.h" include/linux/susfs_def.h
          grep -q 'susfs\.o' fs/Makefile || echo 'obj-y += susfs.o' >> fs/Makefile

          # PART C — KernelSU-Next enablement patch + API shim
          KSU_PATCH="$PATCHES/KernelSU/10_enable_susfs_for_ksu.patch"
          if [[ -f "$KSU_PATCH" ]]; then
            echo ">>> Applying KernelSU-Next SUSFS enablement patch"
            cd KernelSU-Next
            patch -p1 --forward --no-backup-if-mismatch < "$KSU_PATCH" || {
              echo "WARNING: KSU patch had rejects:"; find . -name "*.rej" | head -10
            }
            # Shim: rename old ksu_syscall_hook_manager_* API if present
            if grep -rq 'ksu_syscall_hook_manager_' . --include='*.c' --include='*.h'; then
              echo ">>> Applying hook_manager → hook rename shim"
              find . \( -name '*.c' -o -name '*.h' \) -exec sed -i \
                -e 's/ksu_syscall_hook_manager_init/ksu_syscall_hook_init/g' \
                -e 's/ksu_syscall_hook_manager_exit/ksu_syscall_hook_exit/g' {} +
            fi
            # ksu_late_loaded: inject declaration if patch added calls but not the var
            if grep -q 'ksu_late_loaded' core/init.c 2>/dev/null; then
              if ! grep -qE 'bool ksu_late_loaded|ksu_late_loaded;' ksu.h core/init.c 2>/dev/null; then
                echo ">>> Injecting ksu_late_loaded declaration"
                sed -i '1s/^/static bool ksu_late_loaded = false;\n/' core/init.c
              fi
            fi
            cd ..
          else
            echo "WARNING: $KSU_PATCH not found — skipping"
          fi

          # PART D — optional manual hooks patch
          HOOKS="$PATCHES/60_scope-minimized_manual_hooks.patch"
          if [[ -f "$HOOKS" ]]; then
            echo ">>> Applying scope-minimised manual hooks patch"
            patch -p1 --forward --no-backup-if-mismatch < "$HOOKS" || \
              echo "WARNING: hooks patch had rejects"
          fi

      # ── 9. Pre-build sanity check ────────────────────────────────────────────
      - name: Pre-build sanity check
        run: |
          K="$KERNEL_ROOT/common"
          fail=0
          check() { [[ -f "$1" ]] && echo "PASS: $1" || { echo "FAIL: $1 missing"; fail=1; }; }
          check "$K/include/linux/susfs.h"
          check "$K/include/linux/susfs_def.h"
          check "$K/fs/susfs.c"
          grep -q 'susfs\.o' "$K/fs/Makefile" \
            && echo "PASS: fs/Makefile has susfs.o" \
            || { echo "FAIL: fs/Makefile missing susfs.o"; fail=1; }
          grep -rq 'ksu_syscall_hook_manager_' "$K/drivers/kernelsu/" \
            --include='*.c' --include='*.h' 2>/dev/null \
            && { echo "FAIL: stale ksu_syscall_hook_manager_* still present"; fail=1; } \
            || echo "PASS: no stale hook_manager API"
          [[ $fail -eq 0 ]] || exit 1

      # ── 10. Build with Bazel (Kleaf) ─────────────────────────────────────────
      - name: Build kernel (Bazel / Kleaf)
        run: |
          cd "$KERNEL_ROOT"
          mkdir -p "$DIST_DIR"
          tools/bazel run \
            --jobs=$(nproc --all) \
            --lto="${{ inputs.lto }}" \
            //common:kernel_aarch64_dist \
            -- --destdir="$DIST_DIR"
          echo ">>> Build artifacts:"; ls -lh "$DIST_DIR"

      # ── 11. Build summary ────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          {
            echo "## 🏗️ Build Summary"
            echo "| Component | Value |"
            echo "|---|---|"
            echo "| Manifest branch | \`${{ inputs.manifest_branch }}\` |"
            echo "| KernelSU-Next commit | \`${{ env.KSU_COMMIT }}\` |"
            echo "| SUSFS branch | \`${{ inputs.susfs_branch }}\` |"
            echo "| SUSFS commit | \`${{ env.SUSFS_COMMIT }}\` |"
            echo "| LTO | \`${{ inputs.lto }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── 12. (Optional) Patch stock boot.img ─────────────────────────────────
      - name: Patch stock boot.img with magiskboot
        if: ${{ inputs.boot_image_url != '' }}
        run: |
          curl -L --progress-bar -o stock_boot.img "${{ inputs.boot_image_url }}"
          MAGISK_URL=$(curl -s \
            https://api.github.com/repos/topjohnwu/Magisk/releases/latest \
            | grep browser_download_url | grep '\.apk' | head -1 | cut -d '"' -f4)
          curl -L --progress-bar -o magisk.apk "$MAGISK_URL"
          unzip -qo magisk.apk lib/x86_64/libmagiskboot.so -d magisk_tmp
          cp magisk_tmp/lib/x86_64/libmagiskboot.so magiskboot && chmod +x magiskboot
          mkdir boot_work && cd boot_work
          ../magiskboot unpack ../stock_boot.img
          cp "$DIST_DIR/Image" kernel
          ../magiskboot repack ../stock_boot.img ../patched_boot.img
          cd .. && ls -lh patched_boot.img
          echo "PATCHED_BOOT_READY=true" >> "$GITHUB_ENV"

      # ── 13. (Optional) AnyKernel3 packaging ─────────────────────────────────
      - name: Package with AnyKernel3
        if: ${{ inputs.anykernel3 == true || inputs.anykernel3 == 'true' }}
        run: |
          AK3_DIR="${{ github.workspace }}/AnyKernel3"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git "$AK3_DIR"
          sed -i \
            -e 's/do\.devicecheck=1/do.devicecheck=0/' \
            -e '/^supported\.versions/d' \
            -e '/^supported\.patchlevels/d' \
            "$AK3_DIR/anykernel.sh"
          cp "$DIST_DIR/Image"     "$AK3_DIR/"
          cp "$DIST_DIR/Image.lz4" "$AK3_DIR/" 2>/dev/null || true
          ZIP_NAME="AK3-A14-6.1-KSUN-SUSFS-${{ env.KSU_COMMIT }}.zip"
          cd "$AK3_DIR"
          zip -r9 -q "${{ github.workspace }}/$ZIP_NAME" . -x '*.git*' -x 'README.md'
          cd "${{ github.workspace }}"
          echo "AK3_ZIP=$ZIP_NAME" >> "$GITHUB_ENV"
          ls -lh "$ZIP_NAME"

      # ── 14. Upload artifacts ─────────────────────────────────────────────────
      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-a14-6.1
          path: |
            ${{ env.DIST_DIR }}/Image
            ${{ env.DIST_DIR }}/Image.lz4
          if-no-files-found: warn
          retention-days: 7

      - name: Upload AnyKernel3 ZIP
        if: ${{ inputs.anykernel3 == true || inputs.anykernel3 == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: AK3-A14-6.1-KSUN-SUSFS
          path: ${{ env.AK3_ZIP }}
          if-no-files-found: warn
          retention-days: 7

      - name: Upload patched boot.img
        if: ${{ env.PATCHED_BOOT_READY == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: patched-boot-a14-6.1
          path: patched_boot.img
          if-no-files-found: warn
          retention-days: 7

      - name: Upload full dist folder
        uses: actions/upload-artifact@v4
        with:
          name: dist-a14-6.1-full
          path: ${{ env.DIST_DIR }}/
          if-no-files-found: warn
          retention-days: 3
